name: CI

# ============================================================================
# WORKFLOW ARCHITECTURE: SECURITY-GATED CI FOR INTERNAL AND EXTERNAL CONTRIBUTIONS
# ============================================================================
#
# This workflow implements a multi-gate security architecture to safely run CI
# for both internal team members and external contributors from forks.
#
# KEY SECURITY PRINCIPLES:
# ------------------------
# 1. FORK PRs use pull_request_target (runs in base repo context with secrets)
#    - Has access to repository secrets
#    - Requires manual approval via GitHub Environment protection
#    - Prevents malicious code from accessing secrets without review
#
# 2. INTERNAL PRs use pull_request (runs in PR context, no special privileges)
#    - Automatically trusted (same repository)
#    - No manual approval required
#    - Standard CI permissions
#
# 3. Event filtering prevents duplicate runs:
#    - pull_request: ONLY for internal PRs (head.repo == base.repo)
#    - pull_request_target: ONLY for external PRs (head.repo != base.repo)
#
# WORKFLOW EXECUTION FLOW:
# ------------------------
#
# ┌─────────────────────────────────────────────────────────────────┐
# │ TRIGGER EVENT                                                   │
# │ (push, pull_request, pull_request_target, workflow_dispatch,    │
# │  merge_group, schedule)                                         │
# └────────────────────────┬────────────────────────────────────────┘
#                          │
#                          ▼
#              ┌───────────────────────┐
#              │   SETUP JOB           │
#              │  (Event Filter)       │
#              └───────────┬───────────┘
#                          │
#           ┌──────────────┼──────────────┐
#           │              │              │
#           ▼              ▼              ▼
#    ┌──────────┐   ┌──────────┐   ┌──────────┐
#    │ Internal │   │ External │   │ Release  │
#    │   PR     │   │   PR     │   │ Dispatch │
#    └────┬─────┘   └────┬─────┘   └────┬─────┘
#         │              │              │
#         │         ┌────▼────┐    ┌────▼────┐
#         │         │ GATE 1: │    │ GATE 2: │
#         │         │External │    │Release  │
#         │         │Approval │    │Approval │
#         │         │(Manual) │    │(Manual) │
#         │         └────┬────┘    └────┬────┘
#         │              │              │
#         └──────────────┼──────────────┘
#                        │
#                        ▼
#               ┌────────────────┐
#               │   CI JOB       │
#               │ (Unified Tests)│
#               └────────────────┘
#
# JOB DESCRIPTIONS:
# -----------------
#
# 1. setup
#    Purpose: Event filtering and contributor classification
#    - Filters events to prevent duplicate workflow runs
#    - Determines if PR is from external fork or internal branch
#    - Sets is_external output for downstream jobs
#    Runs for:
#      ✓ pull_request (internal PRs only)
#      ✓ pull_request_target (external PRs only)
#      ✓ push, merge_group, schedule, workflow_dispatch
#
# 2. external-approval
#    Purpose: Manual security gate for fork PRs
#    - Only runs when is_external == 'true'
#    - Requires approval via GitHub Environment: "external-ci"
#    - Prevents untrusted code from accessing secrets
#    - Configure in: Settings → Environments → external-ci
#
# 3. release-approval
#    Purpose: Manual gate for release creation
#    - Only runs when workflow_dispatch with trigger_release == true
#    - Requires approval via GitHub Environment: "release"
#    - Audits who triggered the release
#    - Configure in: Settings → Environments → release
#
# 4. ci
#    Purpose: Unified CI execution
#    - Runs actual tests, builds, and checks
#    - Executes after appropriate gate approvals
#    - Has access to secrets for publishing
#    Execution conditions:
#      ✓ Internal PR: runs immediately after setup
#      ✓ External PR: runs after external-approval succeeds
#      ✓ Release: runs after release-approval succeeds
#      ✓ Push/merge_group/schedule: runs immediately after setup
#
# ============================================================================

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]
  pull_request_target:
    types: [opened, synchronize, reopened]
    branches: ["main"]
  merge_group:
    types: [checks_requested]
  schedule:
    # Runs at 00:00 on the 1st and 15th of every month
    - cron: '0 0 1,15 * *'
  workflow_dispatch:
    inputs:
      trigger_release:
        type: boolean
        default: false
        description: 'Create release PR'
      auto_merge:
        type: boolean
        default: false
        description: 'Enable auto-merge for release PR'

concurrency:
  # Groups by PR number or branch ref. Unique enough to prevent collisions.
  # Releases get their own group and never cancel each other.
  # Main branch workflows (including release publishes) never cancel each other.
  group: ${{ github.event_name == 'workflow_dispatch' && inputs.trigger_release == true && format('release-{0}', github.workflow) || format('{0}-{1}-{2}', github.workflow, github.event.pull_request.number || github.ref, github.event_name) }}
  cancel-in-progress: ${{ github.ref != format('refs/heads/{0}', github.event.repository.default_branch) }}

jobs:
  # Logic Gate: Determine if this is an external contributor
  # Runs on pull_request for internal PRs and pull_request_target for PRs from forks
  setup:
    runs-on: ubuntu-latest
    if: |
      (github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name == github.repository) ||
      (github.event_name == 'pull_request_target' && github.event.pull_request.head.repo.full_name != github.repository) ||
      github.event_name == 'push' ||
      github.event_name == 'merge_group' ||
      github.event_name == 'schedule' ||
      github.event_name == 'workflow_dispatch'
    outputs:
      is_external: ${{ steps.check.outputs.external }}
    steps:
      - name: Validate workflow_dispatch
        if: github.event_name == 'workflow_dispatch'
        run: |
          if [[ "${{ github.ref }}" != "refs/heads/${{ github.event.repository.default_branch }}" ]]; then
            echo "::error::workflow_dispatch can only run on main branch"
            exit 1
          fi
      - id: check
        run: |
          if [[ "${{ github.event_name }}" == "pull_request_target" ]]; then
            echo "external=true" >> $GITHUB_OUTPUT
          else
            echo "external=false" >> $GITHUB_OUTPUT
          fi

  # Gatekeeper: Only runs for external PRs. Requires manual approval via Environment.
  external-approval:
    needs: setup
    if: needs.setup.outputs.is_external == 'true'
    runs-on: ubuntu-latest
    environment: external-ci
    steps:
      - run: echo "External PR approved by environment gate."

  # Release Gatekeeper: Only runs for workflow_dispatch with trigger_release. Requires manual approval.
  release-approval:
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' && inputs.trigger_release == true
    environment: release  # Configure in Settings → Environments
    steps:
      - name: Audit release trigger
        run: |
          echo "::notice::Release triggered by ${{ github.actor }}"
          echo "Event: ${{ github.event_name }}"
          echo "Ref: ${{ github.ref }}"
          echo "Inputs: trigger_release=${{ inputs.trigger_release }}, auto_merge=${{ inputs.auto_merge }}"
      - run: echo "Release approved by environment gate"

  # Unified CI: Runs for internal events OR after external approval OR after release approval
  ci:
    needs: [setup, external-approval, release-approval]
    # always() allows job to run even when dependencies are skipped, but we still require explicit success checks
    # Run if setup succeeds AND (not external OR external-approval succeeds) AND (not release OR release-approval succeeds)
    if: |
      always() &&
      (needs.setup.result == 'success') &&
      (needs.setup.outputs.is_external == 'false' || needs.external-approval.result == 'success') &&
      (github.event_name != 'workflow_dispatch' || inputs.trigger_release != true || needs.release-approval.result == 'success')
    uses: redhat-cop/openshift_virtualization_migration_ci/.github/workflows/ci-ansible-collection.yml@v2
    permissions:
      contents: write
      packages: write
      security-events: write
      actions: read
      pull-requests: write
    with:
      # Use head.sha for PRs to get the actual commit, otherwise fallback to global sha
      ref: ${{ github.event.pull_request.head.sha || github.sha }}
      repo: ${{ github.event.pull_request.head.repo.full_name || github.repository }}
      trigger_release: ${{ inputs.trigger_release || false }}
      auto_merge: ${{ inputs.auto_merge || false }}
      publish_to_automation_hub: true
    secrets:
      automation_hub_token: ${{ secrets.AUTOMATION_HUB_TOKEN }}
      release_app_id:  ${{ secrets.RELEASE_APP_ID }}
      release_app_private_key:  ${{ secrets.RELEASE_APP_PRIVATE_KEY }}
