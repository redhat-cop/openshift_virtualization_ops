---
# _detach_network.yml - Detach network interface from VM

- name: _detach_network | Verify NAD Name Provided
  ansible.builtin.assert:
    that:
      - vm_networking_vm.nad_name | default("", true) | length > 0
    fail_msg: "'nad_name' must be provided for network detachment"
    quiet: true

- name: _detach_network | Build Interface Name
  ansible.builtin.set_fact:
    _vm_networking_iface_name: >-
      {{ vm_networking_vm.nad_name | lower
         | regex_replace('[^a-z0-9-]', '-')
         | regex_replace('-+', '-')
         | regex_replace('^-|-$', '') }}
- name: _detach_network | Check Interface Exists
  ansible.builtin.set_fact:
    _vm_networking_is_attached: >-
      {{ vm_networking_vm.response_obj.spec.template.spec.networks
         | default([])
         | selectattr('multus', 'defined')
         | selectattr('multus.networkName', 'equalto', vm_networking_vm.nad_name)
         | list | length > 0 }}

- name: _detach_network | Build Filtered Lists
  when: _vm_networking_is_attached | bool
  ansible.builtin.set_fact:
    _vm_networking_filtered_networks: >-
      {{ vm_networking_vm.response_obj.spec.template.spec.networks | default([])
         | rejectattr('name', 'equalto', _vm_networking_iface_name) | list }}
    _vm_networking_filtered_interfaces: >-
      {{ vm_networking_vm.response_obj.spec.template.spec.domain.devices.interfaces | default([])
         | rejectattr('name', 'equalto', _vm_networking_iface_name) | list }}

- name: _detach_network | Detach Network Interface
  when: _vm_networking_is_attached | bool
  no_log: true
  kubernetes.core.k8s:
    api_key: "{{ vm_networking_api_key }}"
    host: "{{ vm_networking_openshift_host }}"
    validate_certs: "{{ vm_networking_openshift_verify_ssl }}"
    api_version: kubevirt.io/v1
    kind: VirtualMachine
    namespace: "{{ vm_networking_vm.response_obj.metadata.namespace }}"
    name: "{{ vm_networking_vm.response_obj.metadata.name }}"
    state: patched
    definition:
      spec:
        template:
          spec:
            networks: "{{ _vm_networking_filtered_networks }}"
            domain:
              devices:
                interfaces: "{{ _vm_networking_filtered_interfaces }}"

...
